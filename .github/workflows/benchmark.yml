name: benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: benchmark-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout extension
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build extension
        run: npm run build:ext

      - name: Read and validate fixtures SHA
        id: sha
        run: |
          SHA="$(tr -d '\n\r' < .benchmark-fixtures-sha)"
          if ! [[ "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid fixtures SHA: '$SHA' (must be 40 lowercase hex chars)" >&2
            exit 1
          fi
          echo "value=$SHA" >> "$GITHUB_OUTPUT"

      - name: Clone fixtures repo at pinned SHA
        env:
          FIXTURES_SHA: ${{ steps.sha.outputs.value }}
        run: |
          git clone --depth 1 https://github.com/recost-dev/extension-benchmark.git benchmark-fixtures
          cd benchmark-fixtures
          git fetch --depth 1 origin "$FIXTURES_SHA"
          git checkout "$FIXTURES_SHA"

      - name: Run benchmark
        run: npm run benchmark -- --fixtures ./benchmark-fixtures --report benchmark/report.json

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark/report.json
          if-no-files-found: ignore
